<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿布辛贝神庙·智能语音导览</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1510;
            --sand: #f4eae1;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark);
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: rgba(0, 0, 0, 0.85);
            text-align: center;
            padding: 12px 0;
            border-bottom: 2px solid var(--gold);
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 2px;
        }
        #map-container {
            flex: 1;
            position: relative;
            background: #2a221b;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 🎯 地图图片元素 */
        #hand-drawn-map {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .spot-marker {
            position: absolute;
            width: 32px;
            height: 32px;
            background-color: rgba(212, 175, 55, 0.9);
            border: 2px solid #fff;
            color: var(--dark);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--gold);
            transform: translate(-50%, -50%);
            transition: all 0.3s;
            z-index: 10;
        }
        .spot-marker.active {
            background-color: #ff4500;
            box-shadow: 0 0 25px #ff4500;
            transform: translate(-50%, -50%) scale(1.2);
        }
        #panel-control {
            background-color: rgba(26, 21, 16, 0.95);
            border-top: 2px solid var(--gold);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 45vh;
            overflow-y: auto;
        }
        .audio-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 4px solid var(--gold);
        }
        .audio-info {
            font-size: 0.9rem;
            color: var(--sand);
        }
        .play-btn {
            background-color: var(--gold);
            border: none;
            color: var(--dark);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .play-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }
        .chat-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(214, 175, 55, 0.3);
            border-radius: 8px;
            padding: 12px;
            min-height: 70px;
            max-height: 140px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ddd;
        }
        .chat-input-wrap {
            display: flex;
            gap: 8px;
        }
        .chat-input-wrap input {
            flex: 1;
            background: #2b231a;
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 8px 15px;
            color: #fff;
            outline: none;
            font-size: 0.9rem;
        }
        .chat-input-wrap button {
            background: var(--gold);
            border: none;
            color: var(--dark);
            border-radius: 20px;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>🏛️ 阿布辛贝神庙·智能语音微导览</header>

    <div id="map-container">
        <!-- 🎯 图片路径直接指向 images/map.jpg -->
        <img id="hand-drawn-map" src="images/map.jpg" alt="神庙手绘地图">

        <!-- 9个标注点位置分布 -->
        <div class="spot-marker" style="left: 15%; top: 40%;" onclick="selectSpot(0)">0</div>
        <div class="spot-marker" style="left: 28%; top: 35%;" onclick="selectSpot(1)">1</div>
        <div class="spot-marker" style="left: 40%; top: 45%;" onclick="selectSpot(2)">2</div>
        <div class="spot-marker" style="left: 50%; top: 30%;" onclick="selectSpot(3)">3</div>
        <div class="spot-marker" style="left: 60%; top: 50%;" onclick="selectSpot(4)">4</div>
        <div class="spot-marker" style="left: 68%; top: 35%;" onclick="selectSpot(5)">5</div>
        <div class="spot-marker" style="left: 78%; top: 55%;" onclick="selectSpot(6)">6</div>
        <div class="spot-marker" style="left: 85%; top: 40%;" onclick="selectSpot(7)">7</div>
        <div class="spot-marker" style="left: 92%; top: 48%;" onclick="selectSpot(8)">8</div>
    </div>

    <div id="panel-control">
        <div class="audio-bar">
            <div class="audio-info">
                <span id="spot-title">🔊 请点击地图点位开启讲解</span>
            </div>
            <button class="play-btn" id="play-trigger" onclick="toggleAudio()" disabled>播放</button>
            <audio id="global-player" style="display: none;"></audio>
        </div>

        <div class="chat-section">
            <div class="chat-box" id="ai-bubble">
                🔮 <b>法老密示：</b><br>游客，点击地图上的金色徽章即可聆听史诗。若有历史疑问，尽管在此向我发问……
            </div>
            <div class="chat-input-wrap">
                <input type="text" id="user-question" placeholder="向法老拉美西斯二世提问..." onkeypress="handleKeyPress(event)">
                <button onclick="askPharaoh()">提问</button>
            </div>
        </div>
    </div>

    <script>
        const spotNames = {
            0: "0号点：神庙主入口巨像",
            1: "1号点：大柱厅",
            2: "2号点：第二厅壁画",
            3: "3号点：多柱厅冥界浮雕",
            4: "4号点：祭祀前厅",
            5: "5号点：圣殿四神像",
            6: "6号点：太阳奇迹观测点",
            7: "7号点：哈索尔神庙（王后庙）",
            8: "8号点：纳赛尔湖畔观景台"
        };

        let currentSpotId = null;
        const player = document.getElementById("global-player");
        const playBtn = document.getElementById("play-trigger");

        function selectSpot(id) {
            currentSpotId = id;
            
            document.querySelectorAll(".spot-marker").forEach((el, index) => {
                if (index === id) el.classList.add("active");
                else el.classList.remove("active");
            });

            document.getElementById("spot-title").innerText = spotNames[id];
            playBtn.removeAttribute("disabled");
            playBtn.innerText = "播放";

            player.src = `audio/${id}.mp3`;
            player.play().then(() => {
                playBtn.innerText = "暂停";
            }).catch(e => console.log("用户需交互后播放"));

            document.getElementById("ai-bubble").innerHTML = `🔮 <b>法老密示：</b><br>你已抵达【${spotNames[id]}】。听完我的低语，如果还有不解之谜，写在下方问我。`;
        }

        function toggleAudio() {
            if (currentSpotId === null) return;
            if (player.paused) {
                player.play();
                playBtn.innerText = "暂停";
            } else {
                player.pause();
                playBtn.innerText = "播放";
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') askPharaoh();
        }

        async function askPharaoh() {
            const input = document.getElementById("user-question");
            const bubble = document.getElementById("ai-bubble");
            const question = input.value.trim();

            if (!question) return;

            input.value = "";
            bubble.innerHTML = "⏳ <i>法老正拨开三千年的风沙，在泥板上翻阅史料...</i>";

            try {
                const contextQuestion = currentSpotId !== null 
                    ? `当前游客在：${spotNames[currentSpotId]}。问题是：${question}`
                    : question;

                const res = await fetch(`/api/chat?question=${encodeURIComponent(contextQuestion)}`);
                const data = await res.json();

                if (data.answer) {
                    bubble.innerHTML = `🔮 <b>法老密示：</b><br>${data.answer}`;
                } else {
                    bubble.innerHTML = `🔮 <b>法老密示：</b><br>风沙太大，未听清你的言语，请再试一次。`;
                }
            } catch (error) {
                console.error(error);
                bubble.innerHTML = `🔮 <b>法老密示：</b><br>法老正在神殿沉睡，恢复网络后再来打扰吧。`;
            }
        }

        // 注册 PWA 离线服务
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('离线导览系统准备就绪！'))
                    .catch(err => console.log('离线注册失败:', err));
            });
        }
    </script>
</body>
</html>
